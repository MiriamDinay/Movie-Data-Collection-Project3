<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Rating Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; direction: ltr; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: Arial, sans-serif; }
        textarea { resize: vertical; } 
        
        button { width: 100%; padding: 12px; background-color: #8bc34a; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        button:hover { background-color: #7cb342; }
        
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; color: #28a745; text-align: center; }
        #error { margin-top: 20px; font-size: 16px; color: #dc3545; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Predict Movie Rating</h2>
        <form id="predictForm">
            <div class="form-group">
                <label for="startYear">Release Year:</label>
                <input type="number" id="startYear" placeholder="e.g., 2023">
            </div>
            
            <div class="form-group">
                <label for="runtimeMinutes">Runtime (Minutes):</label>
                <input type="number" id="runtimeMinutes" placeholder="e.g., 120">
            </div>
            
            <div class="form-group">
                <label for="genres">Genres (Comma separated):</label>
                <input type="text" id="genres" placeholder="e.g., Action, Drama, Comedy">
            </div>

            <div class="form-group">
                <label for="Country">Production Countries (Comma separated):</label>
                <input type="text" id="Country" placeholder="e.g., United States, UK">
            </div>

            <div class="form-group">
                <label for="plot">Plot Summary:</label>
                <textarea id="plot" rows="4" placeholder="Enter movie plot here..."></textarea>
            </div>

            <button type="submit">Predict Rating</button>
        </form>

        <div id="result"></div>
        <div id="error"></div>
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', function(e) {
            e.preventDefault();

            document.getElementById('result').innerText = '';
            document.getElementById('error').innerText = '';

            const data = {
                startYear: document.getElementById('startYear').value,
                runtimeMinutes: document.getElementById('runtimeMinutes').value,
                genres: document.getElementById('genres').value,
                Country: document.getElementById('Country').value,
                plot: document.getElementById('plot').value
            };

            fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json().then(resData => ({status: response.status, body: resData})))
            .then(res => {
                if (res.status === 200) {
                    document.getElementById('result').innerText = 'Predicted Rating: ' + res.body.predicted_rating + ' / 10';
                } else {
                    document.getElementById('error').innerText = 'Error: ' + res.body.error;
                }
            })
            .catch(error => {
                document.getElementById('error').innerText = 'Network Error: Failed to reach the server.';
            });
        });
    </script>
</body>
</html>
